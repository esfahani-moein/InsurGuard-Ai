version: '3.9'

services:
  frontend:
    build:
      context: ./frontend-services
      dockerfile: Dockerfile
    image: insurguard-frontend:latest
    container_name: insurguard-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - insurguard-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend-services
      dockerfile: Dockerfile
    image: insurguard-backend:latest
    container_name: insurguard-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend-services/.env
    environment:
      - APP_ENV=production
      - CHROMA_PERSIST_DIR=/data/chroma
      - UPLOAD_DIR=/tmp/insurguard_uploads
    volumes:
      - backend_chroma:/data/chroma
      - backend_uploads:/tmp/insurguard_uploads
    networks:
      - insurguard-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  backend_chroma:
  backend_uploads:

networks:
  insurguard-net:
    driver: bridge
